{% extends "base.html" %}

{% block title %}Create Ad - Media Downloader{% endblock %}
{% block header %}Create Advertising Campaign{% endblock %}

{% block content %}
<div class="max-w-2xl">
    <div class="bg-white rounded-lg shadow p-6">
        <form action="/admin/ads/create" method="post">
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">Campaign Name</label>
                <input type="text" name="name" required
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500"
                       placeholder="Summer Promo 2024">
            </div>

            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">Message Text</label>
                <textarea name="content" rows="5" required
                          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500"
                          placeholder="Your ad message..."></textarea>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Button Text</label>
                    <input type="text" name="button_text"
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg"
                           placeholder="Learn More">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Button URL</label>
                    <input type="url" name="button_url"
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg"
                           placeholder="https://example.com">
                </div>
            </div>

            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">Target Language</label>
                <select name="target_language" class="w-full px-3 py-2 border border-gray-300 rounded-lg">
                    <option value="">All Languages</option>
                    {% for lang in languages %}
                    <option value="{{ lang }}">
                        {% if lang == "ru" %}🇷🇺 Russian
                        {% elif lang == "en" %}🇺🇸 English
                        {% elif lang == "uk" %}🇺🇦 Ukrainian
                        {% else %}{{ lang }}
                        {% endif %}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-2">Select Bots</label>
                <div class="space-y-2 max-h-48 overflow-y-auto border rounded-lg p-3">
                    {% for bot in bots %}
                    <label class="flex items-center">
                        <input type="checkbox" name="bot_ids" value="{{ bot.id }}"
                               class="rounded border-gray-300 text-blue-600 mr-2">
                        <span>{{ bot.name }} (@{{ bot.username }}) - {{ bot.total_users }} users</span>
                    </label>
                    {% endfor %}
                </div>
            </div>

            <div class="flex space-x-4">
                <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700">
                    <i class="fas fa-save mr-2"></i> Create Draft
                </button>
                <a href="/admin/ads" class="px-6 py-2 border rounded-lg hover:bg-gray-50">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
