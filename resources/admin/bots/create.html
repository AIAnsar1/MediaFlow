{% extends "base.html" %}

{% block title %}Add Bot - Media Downloader{% endblock %}
{% block header %}Add New Bot{% endblock %}

{% block content %}
<div class="max-w-2xl">
    <div class="bg-white rounded-lg shadow p-6">
        <form action="/admin/bots/create" method="post">
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">Bot Token</label>
                <input type="text" name="token" required
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500"
                       placeholder="123456789:ABCdefGHIjklMNOpqrsTUVwxyz">
                <p class="text-sm text-gray-500 mt-1">Get token from @BotFather</p>
            </div>

            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">Display Name</label>
                <input type="text" name="name"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500"
                       placeholder="My Download Bot">
            </div>

            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-2">Description</label>
                <textarea name="description" rows="3"
                          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500"
                          placeholder="Bot description..."></textarea>
            </div>

            <div class="flex space-x-4">
                <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700">
                    <i class="fas fa-plus mr-2"></i> Add Bot
                </button>
                <a href="/admin/bots" class="px-6 py-2 border rounded-lg hover:bg-gray-50">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
